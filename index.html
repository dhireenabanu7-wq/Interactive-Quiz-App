<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Quiz App</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <header>

        <div>
            <h1>🎯 Ultimate Quiz Platform</h1>
            <p>Test Your Knowledge Like a Pro</p>
        </div>

        <button id="themeBtn">
            🌙 Dark Mode
        </button>

    </header>

    <section class="dashboard">

        <div class="card">
            <h3>Total Score</h3>
            <h2 id="scoreCard">0</h2>
        </div>

        <div class="card">
            <h3>Correct</h3>
            <h2 id="correctCard">0</h2>
        </div>

        <div class="card">
            <h3>Wrong</h3>
            <h2 id="wrongCard">0</h2>
        </div>

        <div class="card">
            <h3>Accuracy</h3>
            <h2 id="accuracyCard">0%</h2>
        </div>

    </section>

    <section class="settings">

        <select id="category">
            <option value="all">All Categories</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="js">JavaScript</option>
        </select>

        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>

        <button id="startBtn">
            Start Quiz
        </button>

    </section>

    <section class="quiz-section" id="quizSection">

        <div class="top-info">

            <div class="timer-box">
                ⏱️ Time Left:
                <span id="timer">15</span>
            </div>

            <div class="question-count">
                Question
                <span id="currentQuestion">1</span>
                /
                <span id="totalQuestions">10</span>
            </div>

        </div>

        <div class="progress">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </section>
</div>

<script src="script.js"></script>

</body>
</html>
