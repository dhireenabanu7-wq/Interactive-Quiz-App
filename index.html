<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Quiz App</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <header>

        <div>
            <h1>🎯 Ultimate Quiz Platform</h1>
            <p>Test Your Knowledge Like a Pro</p>
        </div>

        <button id="themeBtn">
            🌙 Dark Mode
        </button>

    </header>

    <section class="dashboard">

        <div class="card">
            <h3>Total Score</h3>
            <h2 id="scoreCard">0</h2>
        </div>

        <div class="card">
            <h3>Correct</h3>
            <h2 id="correctCard">0</h2>
        </div>

        <div class="card">
            <h3>Wrong</h3>
            <h2 id="wrongCard">0</h2>
        </div>

        <div class="card">
            <h3>Accuracy</h3>
            <h2 id="accuracyCard">0%</h2>
        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
